name: PR Agent

on:
  pull_request:
    types: [opened, reopened, synchronize]
  issue_comment:

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}

    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: write
      contents: write
      checks: write

    steps:
      - name: PR Agent
        uses: the-pr-agent/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # 讯飞 API Key
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}

          # 讯飞 MaaS OpenAI兼容地址
          OPENAI.API_BASE: https://maas-api.cn-huabei-1.xf-yun.com/v2
          # 模型
          config.model: xop35qwen2b
